<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eli & Nic" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" />

    <title>Eli & Nic - Couple OS</title>
    <link rel="stylesheet" href="/index.css">

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
    
    <!-- Dynamic PWA Manifest -->
    <script>
      const manifest = {
        name: "Eli & Nic Couple OS",
        short_name: "Eli & Nic",
        start_url: ".",
        display: "standalone",
        background_color: "#f8fafc",
        theme_color: "#6366f1",
        icons: [{
          src: "https://cdn-icons-png.flaticon.com/512/833/833472.png",
          sizes: "512x512",
          type: "image/png"
        }]
      };
      const content = encodeURIComponent(JSON.stringify(manifest));
      const url = "data:application/manifest+json," + content;
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = url;
      document.head.appendChild(link);
    </script>
  </head>
  <body class="bg-slate-50 text-slate-800 overflow-hidden transition-colors duration-500 select-none">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
